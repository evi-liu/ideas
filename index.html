<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
    background: #0d1117; color: #e6edf3; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px;
  }
  h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
  p { color: #9198a1; margin-bottom: 32px; }
  .cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 480px; }
  a {
    display: block; padding: 16px 20px; background: #161b22;
    border: 1px solid #30363d; border-radius: 8px; text-decoration: none;
    color: #e6edf3; transition: all .15s;
  }
  a:hover { border-color: #4493f8; background: #1f6feb11; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: #9198a1; }
</style>
</head>
<body>
  <h1>Ideas</h1>
  <p>Concept mockups and explorations</p>
  <div class="cards">
    <a href="issues-as-a-spec/">
      <div class="card-title">Issues-as-a-Spec</div>
      <div class="card-desc">AI-assisted spec writing, implementation plan generation, and agent assignment — all from the issue page.</div>
    </a>
  </div>
</body>
</html>
